<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">

  <title>Frontend Mentor | Stats preview card component</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Lexend+Deca:wght@100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">

<body>

  <main class="card__container">
    <section class="card__info-section">
      <section class="card__text-section">
        <h1 class="card__title">Get <em>insights</em> that help your business grow.</h1>
        <p class="card__description">
          Discover the benefits of data analytics and make better decisions regarding revenue, customer
          experience, and overall efficiency.
        </p>
      </section>
      <section >
        <ul class="card__stats-section">
        <li class="card__stats"><span class="card__stats-values">10k+</span> companies</li>
        <li class="card__stats"><span class="card__stats-values"> 314</span> templates</li>
        <li class="card__stats"><span class="card__stats-values">12m+</span> queries</li>
        </ul>
      </section>
    </section>

    <section class="card__img-section">
      <picture>
        <source srcset=" ./images/image-header-desktop.jpg" alt="" media="(min-width:500px)">
        <img src="./images/image-header-mobile.jpg" alt="" width="654" height="480">
      </picture>
    </section>
  </main>


</body>

</html>
